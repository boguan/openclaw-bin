name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "openclaw version (e.g. 2026.3.28)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  # ── 1. Create a draft release so all build jobs can upload to the same tag ──
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Resolve tag
        id: tag
        run: echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        run: |
          gh release create v${{ inputs.version }} \
            --repo ${{ github.repository }} \
            --title "openclaw v${{ inputs.version }}" \
            --draft

  # ── 2. Build on each platform in parallel ──
  build:
    needs: create-release
    strategy:
      fail-fast: false          # let other platforms finish even if one fails
      matrix:
        include:
          - os: macos-26            # Apple Silicon (arm64)
            platform: darwin
            arch: arm64
            ext: tar.gz
          - os: macos-26-intel      # Intel (x64)
            platform: darwin
            arch: x64
            ext: tar.gz
          - os: ubuntu-24.04
            platform: linux
            arch: x64
            ext: tar.gz
          - os: windows-2025
            platform: win32
            arch: x64
            ext: zip

    runs-on: ${{ matrix.os }}

    env:
      ASSET_NAME: openclaw-${{ inputs.version }}-${{ matrix.platform }}-${{ matrix.arch }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # npm install compiles native modules against the runner's Node.js 22.
      # After install:
      #   node_modules/openclaw/openclaw.mjs   ← entry point
      #   node_modules/openclaw/dist/
      #   node_modules/openclaw/assets/
      #   node_modules/openclaw/skills/
      #   node_modules/<dep>/                  ← all deps incl. native .node files
      - name: Install openclaw ${{ inputs.version }}
        run: npm install openclaw@${{ inputs.version }}

      # Assemble staging dir with a clean layout:
      #   openclaw/
      #     openclaw.mjs      ← entry point at top level
      #     dist/
      #     assets/
      #     skills/
      #     node_modules/     ← all deps
      - name: Assemble staging directory (unix)
        if: matrix.ext == 'tar.gz'
        run: |
          mkdir -p staging/openclaw
          # Hoist openclaw package contents to top level
          cp -r node_modules/openclaw/. staging/openclaw/
          # Remove the self-referencing openclaw entry inside node_modules
          rm -rf staging/openclaw/node_modules/openclaw
          # Move all deps into staging/openclaw/node_modules
          cp -r node_modules/. staging/openclaw/node_modules/
          rm -rf staging/openclaw/node_modules/openclaw

      - name: Assemble staging directory (windows)
        if: matrix.ext == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force staging/openclaw | Out-Null
          # Hoist openclaw package contents to top level
          Copy-Item -Recurse node_modules/openclaw/* staging/openclaw/
          # Move all deps into staging/openclaw/node_modules
          Copy-Item -Recurse node_modules staging/openclaw/node_modules
          # Remove the self-referencing openclaw entry inside node_modules
          Remove-Item -Recurse -Force staging/openclaw/node_modules/openclaw

      - name: Package tarball (unix)
        if: matrix.ext == 'tar.gz'
        run: |
          mkdir -p dist-pkg
          tar -czf dist-pkg/${{ env.ASSET_NAME }}.tar.gz \
            -C staging openclaw

      - name: Package zip (windows)
        if: matrix.ext == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist-pkg | Out-Null
          Compress-Archive \
            -Path staging/openclaw \
            -DestinationPath dist-pkg/${{ env.ASSET_NAME }}.zip

      - name: Upload release asset
        run: |
          gh release upload ${{ needs.create-release.outputs.tag }} \
            dist-pkg/${{ env.ASSET_NAME }}.${{ matrix.ext }} \
            --repo ${{ github.repository }}

  # ── 3. All platforms done → publish the release ──
  publish-release:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Publish release
        run: |
          gh release edit ${{ needs.create-release.outputs.tag }} \
            --repo ${{ github.repository }} \
            --draft=false
